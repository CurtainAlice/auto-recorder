name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyperclip openpyxl pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name "智能表格复制工具" --clean smart_copy.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: 智能表格复制工具
        path: dist/
        retention-days: 30
